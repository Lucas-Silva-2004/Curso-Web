<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=devi   ce-width, initial-scale=1.0">
    <title>Responsividade</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.2rem;
            background-color: #000000;
            color: white;
            padding: 5px;
        }
        
        .grid {
            height: 100vh;
            column-gap: 20px;
            row-gap: 20px;
            display: grid;

        }

        /* Estilos para dispositivos com largura máxima de 600px, como smartphones */
        @media (max-width: 599px) {
            .grid {
                /* Especs como gap, display e etc, já foram definidos anteriormente e o interpretador os utilizará e irá alterar apenas as mudanças definidas a seguir. Dessa forma, não sendo necessário tendo que definí-los novamente (a não ser que haja alguma alteração) */
                grid-template-columns: 1fr;
                grid-template-areas:
                    'cabecalho'
                    'principal'
                    'navegacao'
                    'rodape';
            }
        }

        @media (min-width: 600px) {
            .grid {
                grid-template-columns: 1fr 1fr;
                grid-template-areas:
                    /* Aqui definimos a ordem das áreas na grade */
                    'cabecalho cabecalho'
                    'navegacao principal'
                    'rodape rodape';
            }
        }

        @media (min-width: 1200px) {
            .grid {
                grid-template-columns: 1fr 3fr;
                grid-template-areas:none
                    'navegacao cabecalho'
                    'navegacao principal'
                    'navegacao rodape';
            }
        }

        header,
        nav,
        main,
        footer {
            border: 3px solid yellow;
        }

        /* Definindo os nomes das áreas com grid-area */
        header {
            grid-area: cabecalho;
        }

        nav {
            grid-area: navegacao;
        }

        main {
            grid-area: principal;
        }

        footer {
            grid-area: rodape;
        }
    </style>
</head>

<body>
    <div class="grid">
        <header>Cabeçalho</header>
        <nav>
            Menu de navegação
        </nav>
        <main>
            <h2>Conteúdo do Sistema</h2>
            <p>lore ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et
                dolore magna aliqua.</p>
        </main>
        <footer>Lucas Silva, 2026</footer>
    </div>
</body>

</html>
