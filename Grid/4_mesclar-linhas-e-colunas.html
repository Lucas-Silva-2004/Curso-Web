<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesclar Linhas e Colunas</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 3rem;
            background-color: #000000;
            color: white;
            padding: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* cada coluna ocupa 1 fração do espaço disponível */
            column-gap: 20px; /* Espaçamento entre colunas */
            row-gap: 20px; /* Espaçamento entre linhas */
        }

        .grid > div {
            border: 1px solid yellow;
        }

        .item1 {
            grid-column-start: 1;
            grid-column-end: 3; /* Mescla a primeira coluna com a segunda que finaliza na terceira linha */
        }
    </style>
</head>
<body>
    <main>
        <div class="grid">
            <div class="item1">1</div>
            <div class="item2">2</div>
            <div class="item3">3</div>
            <div class="item4">4</div>
            <div class="item5">5</div>
            <div class="item6">6</div>
            <div class="item7">7</div>
            <div class="item8">8</div>
            <div class="item9">9</div>
            <div class="item10">10</div>
            <div class="item11">11</div>
            <div class="item12">12</div>
        </div>
    </main>
</body>
</html>
