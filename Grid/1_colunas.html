<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colunas Grid</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 3rem;
            background-color: #000000;
            color: white;
        }

        .grid {
            display: grid;
            /* grid-template-columns: 200px 200px 200px; */ /* 3 colunas de 200px */
            /* grid-template-columns: 40% 40% 20%; 2 colunas de 40% e 1 coluna de 20% */
            /* grid-template-columns: repeat(3, 33%); 3 colunas de 33%. O repeat é mais prático para a criação de diversas colunas do mesmo tamanho */
            /* grid-template-columns: repeat(2, 20%) 200px; 2 colunas de 20% e 1 coluna de 200px */
            /* grid-template-columns: 1fr 1fr 1fr; 3 colunas de tamanho igual, cada uma ocupando 1 fração do espaço disponível */
            grid-template-columns: 20% 1fr 1fr; /* 1 coluna de 20% e 2 colunas de tamanho igual, cada uma ocupando 1 fração do espaço disponível */

        .grid > div {
            border: 1px solid yellow;
        }
    </style>
</head>
<body>
    <main>
        <div class="grid">
            <div class="item1">1</div>
            <div class="item2">2</div>
            <div class="item3">3</div>
            <div class="item4">4</div>
            <div class="item5">5</div>
            <div class="item6">6</div>
            <div class="item7">7</div>
            <div class="item8">8</div>
            <div class="item9">9</div>
            <div class="item10">10</div>
            <div class="item11">11</div>
            <div class="item12">12</div>
        </div>
    </main>
</body>
</html>
