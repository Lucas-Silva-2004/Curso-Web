<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM - Manipulando estilos de elementos</title>
    
    <style>
        * {
            font-family: verdana;
        }
    </style>    
    
    <script src="index.js" defer></script>
</head>
<body>
    <h3>Manipulando estilo</h3>
    <button type="button" onclick="modificaEstilo('#FF0000')">Vermelho</button>
    <button type="button" onclick="modificaEstilo('#00FF00')">Verde</button>
    <button type="button" onclick="modificaEstilo('#0000FF')">Azul</button>
    <hr>
    <div id="quadrado" style="border: solid 2px black; width: 100px; height: 100px"></div>
</body>
</html>
