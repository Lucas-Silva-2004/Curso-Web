<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM - Manipulando valores de input</title>
    
    <style>
        * {
            font-family: verdana;
        }

        .quadrado {
            width: 100%;
            height: 200vh;
        }
        
    </style>    
    
    <script src="index.js" defer></script>
</head>
<body>
    <input type="text" placeholder="Digite um caractere aqui: " onkeyup="distribuiCaractere()" id="entrada">
    <hr>
    <span>Letras</span>
    <input type="text" disabled id="apenasLetras">
    <span>Números</span>
    <input type="text" disabled id="apenasNumeros">
</body>
</html>
