<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>

    <link rel="stylesheet" href="style.css" type="">
    <script src="index.js" defer></script>
</head>

<body>
    <main>
        <section id="calculadora">
            <article id="topoCalculadora">
                <input id="tela" class="estiloTela">
            </article>
            <article id="areaBotoes">
                <button id="clear" class="clear" onclick="calcular('acao', 'c')">C</button>
                <button id="divisao" class="divisao" onclick="calcular('acao', '/')">/</button>
                <button id="multiplicacao" class="multiplicacao" onclick="">X</button>
                <button id="7" class="" onclick="calcular('valor', 7)">7</button>
                <button id="8" class="" onclick="calcular('valor', 8)">8</button>
                <button id="9" class="" onclick="calcular('valor', 9)">9</button>
                <button id="subtracao" class="" onclick="calcular('acao', '-')">-</button>
                <button id="4" class="" onclick="calcular('valor', 4)">4</button>
                <button id="5" class="" onclick="calcular('valor', 5)">5</button>
                <button id="6" class="" onclick="calcular('valor', 6)">6</button>
                <button id="soma" class="" onclick="calcular('acao', '+')">+</button>
                <button id="1" class="" onclick="calcular('valor', 1)">1</button>
                <button id="2" class="" onclick="calcular('valor', 2)">2</button>
                <button id="3" class="" onclick="calcular('valor', 3)">3</button>
                <button id="resultado" class="resultado" onclick="calcular('acao', '=')">=</button>
                <button id="0" class="zero" onclick="calcular('valor', 0)">0</button>
                <button id="." class="" onclick="calcular('acao', '.')">.</button>
            </article>
        </section>
    </main>
</body>

</html>
