<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>

    <link rel="stylesheet" href="style.css" type="">
    <script src="index.js" defer></script>
</head>

<body>
    <main>
        <section id="calculadora">
            <article id="topoCalculadora">
                <input id="tela" class="estiloTela">
            </article>
            <article id="areaBotoes">
                <button id="" class="coseno" onclick="">C</button>
                <button id="" class="divisao" onclick="">/</button>
                <button id="" class="multiplicacao" onclick="">X</button>
                <button id="" class="" onclick="">7</button>
                <button id="" class="" onclick="">8</button>
                <button id="" class="" onclick="">9</button>
                <button id="" class="" onclick="">-</button>
                <button id="" class="" onclick="">4</button>
                <button id="" class="" onclick="">5</button>
                <button id="" class="" onclick="">6</button>
                <button id="" class="" onclick="">+</button>
                <button id="" class="" onclick="">1</button>
                <button id="" class="" onclick="">2</button>
                <button id="" class="" onclick="">3</button>
                <button id="" class="resultado" onclick="">=</button>
                <button id="" class="zero" onclick="">0</button>
                <button id="" class="" onclick="">.</button>
            </article>
        </section>
    </main>
</body>

</html>
